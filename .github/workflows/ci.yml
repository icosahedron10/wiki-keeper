name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy mcp_server --exclude "mcp_server/tests"

      - name: Test
        run: python -m pytest

      - name: Build package
        run: python -m build

      - name: Smoke install built wheel
        shell: bash
        run: |
          python -m venv smoke
          if [ "$RUNNER_OS" = "Windows" ]; then
            PY="smoke/Scripts/python"
          else
            PY="smoke/bin/python"
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install dist/*.whl
          "$PY" - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys
          import sysconfig

          scripts = pathlib.Path(sysconfig.get_path("scripts"))
          exe = scripts / ("wiki-keeper.exe" if os.name == "nt" else "wiki-keeper")
          subprocess.run([str(exe), "--help"], check=True)
          subprocess.run([sys.executable, "-m", "mcp_server.cli", "init", "--repo", ".", "--dry-run"], check=True)
          PY

      - name: Validate workflow YAML
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in [*Path(".github").rglob("*.yml"), *Path(".github").rglob("*.yaml"), *Path(".github").rglob("action.yml")]:
              yaml.safe_load(path.read_text(encoding="utf-8"))
          PY
